<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Big Five EPL</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="container-box text-center">

        <img src="{{ url_for('static', filename='logos/premierleague.png') }}" width="120">
        <h2 class="mt-3">PREDIKSI BIG FIVE EPL</h2>

        <form action="/predict" method="post" class="mt-4">

            <select name="team" class="form-control mb-2">
                <option>Arsenal</option>
                <option>Manchester City</option>
                <option>Liverpool</option>
                <option>Chelsea</option>
                <option>Manchester United</option>
                <option>Tottenham</option>
                <option>Aston Villa</option>
            </select>

            <input name="win" class="form-control mb-2" placeholder="Win" required>
            <input name="draw" class="form-control mb-2" placeholder="Draw" required>
            <input name="lose" class="form-control mb-2" placeholder="Lose" required>
            <input name="goals" class="form-control mb-2" placeholder="Goals" required>
            <input name="points" class="form-control mb-2" placeholder="Points" required>

            <button class="btn btn-success w-100">Prediksi</button>
        </form>

        {% if prediction %}
        <div class="result-box text-center">

            <img src="{{ url_for('static', filename='logos/' + logo) }}" width="100">
            <h3>{{ team }}</h3>
            <h4>{{ prediction }}</h4>

            <!-- Grafik -->
            <img src="{{ url_for('static', filename='chart/chart.png') }}" width="300" class="mt-3">

            <!-- Tabel -->
            <table class="table table-dark mt-3">
                <tr>
                    <th>Win</th>
                    <th>Draw</th>
                    <th>Lose</th>
                    <th>Goals</th>
                    <th>Points</th>
                </tr>
                <tr>
                    <td>{{ data[0] }}</td>
                    <td>{{ data[1] }}</td>
                    <td>{{ data[2] }}</td>
                    <td>{{ data[3] }}</td>
                    <td>{{ data[4] }}</td>
                </tr>
            </table>

            <!-- Download -->
            <a href="{{ url_for('static', filename='hasil_prediksi.xlsx') }}" class="btn btn-warning">
                Download Excel 📁
            </a>

        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
